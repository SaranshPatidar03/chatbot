# Production overlay — single entrypoint on port 80, no dev bind mounts.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  postgres:
    ports: []

  redis:
    ports: []

  chromadb:
    ports: []

  mailpit:
    profiles: [dev]

  backend:
    build:
      target: production
    environment:
      APP_DEBUG: "false"
      APP_ENV: production
      FRONTEND_URL: http://localhost
      CORS_ORIGINS: http://localhost
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  worker:
    build:
      target: production
    volumes:
      - ./storage:/app/storage
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      target: production
      args:
        VITE_API_BASE_URL: /api/v1
    ports: []
    volumes: []
    command: ["nginx", "-g", "daemon off;"]

  nginx:
    image: nginx:1.27-alpine
    container_name: chatbot-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
