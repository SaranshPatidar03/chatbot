# TLS overlay — HTTPS on port 443 with mounted certificates.
# Generate dev certs first: make tls-certs
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.tls.yml up -d --build

services:
  nginx:
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_TLS_PORT:-443}:443"
    volumes:
      - ./docker/nginx.tls.conf:/etc/nginx/nginx.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
